name: CI

on:
  push:
  pull_request:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - '3.11'
          - '3.12'
          - '3.13'
          - '3.14'  # experimental: Django 5.2 not yet officially certified for 3.14
    env:
      DEBUG: 'True'
      SECRET_KEY: ci-secret-key
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run Django system checks
        run: python manage.py check

      - name: Check model migrations are committed
        run: python manage.py makemigrations --check --dry-run

      - name: Validate seed data files
        run: python manage.py seed_peptides --dry-run

      - name: Run test suite
        run: |
          if [ "${{ matrix.python-version }}" = "3.11" ]; then
            pytest --ignore=tests/e2e --cov=core --cov=peptides_project --cov-report=term-missing --cov-fail-under=90 -q
          else
            pytest --ignore=tests/e2e -q
          fi

      - name: Install Playwright browser
        if: matrix.python-version == '3.11'
        run: python -m playwright install --with-deps chromium

      - name: Run browser E2E tests
        if: matrix.python-version == '3.11'
        env:
          VISUAL_SNAPSHOT_DIR: test-results/visual
        run: pytest tests/e2e -q

      - name: Upload visual screenshots
        if: always() && matrix.python-version == '3.11'
        uses: actions/upload-artifact@v7
        with:
          name: visual-regression-screenshots
          path: test-results/visual
          if-no-files-found: ignore
