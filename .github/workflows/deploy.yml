name: Deploy to Production

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-production-master
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Validate Deploy Secrets
        run: |
          test -n "${{ secrets.SERVER_IP }}" || (echo "SERVER_IP secret is missing" && exit 1)
          test -n "${{ secrets.SSH_PRIVATE_KEY }}" || (echo "SSH_PRIVATE_KEY secret is missing" && exit 1)
          test -n "${{ secrets.PEPTIDES_SECRET_KEY }}" || (echo "PEPTIDES_SECRET_KEY secret is missing" && exit 1)
          test -n "${{ secrets.PEPTIDES_DB_PASSWORD }}" || (echo "PEPTIDES_DB_PASSWORD secret is missing" && exit 1)

      - name: Deploy via SSH
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2
        with:
          host: ${{ secrets.SERVER_IP }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /var/www/peptides-guide
            git fetch origin master
            git reset --hard origin/master
            cat > .env <<'EOF'
            SECRET_KEY=${{ secrets.PEPTIDES_SECRET_KEY }}
            PEPTIDES_DB_PASSWORD=${{ secrets.PEPTIDES_DB_PASSWORD }}
            EOF
            chmod 600 .env

            # Pre-deploy DB snapshot. Critical for rollback safety, especially
            # because the steps below run `migrate` (which may apply framework
            # migrations that aren't trivially reversible) on the live DB.
            BACKUP_TS=$(date +%Y%m%d_%H%M%S)
            BACKUP_DIR=/var/www/peptides-backups
            mkdir -p "$BACKUP_DIR"
            docker exec peptides-db pg_dump -U peptides -d peptides \
              > "$BACKUP_DIR/peptides_pre_deploy_${BACKUP_TS}.sql"
            # Keep only the last 10 pre-deploy snapshots to bound disk usage.
            ls -1t "$BACKUP_DIR"/peptides_pre_deploy_*.sql | tail -n +11 | xargs -r rm -f
            echo "DB snapshot saved: peptides_pre_deploy_${BACKUP_TS}.sql"

            docker compose down
            docker compose build --no-cache
            docker compose up -d
            docker network connect docker-infra_app-network peptides-web || true
            docker network connect docker-infra_app-network peptides-db || true
            docker exec peptides-web python manage.py migrate
            SEED_BACKUP_FILE="peptides_pre_seed_${BACKUP_TS}.json"
            docker exec peptides-web python manage.py seed_peptides \
              --backup-json "/tmp/${SEED_BACKUP_FILE}"
            docker cp "peptides-web:/tmp/${SEED_BACKUP_FILE}" "$BACKUP_DIR/${SEED_BACKUP_FILE}"
            docker exec peptides-web rm -f "/tmp/${SEED_BACKUP_FILE}"
            ls -1t "$BACKUP_DIR"/peptides_pre_seed_*.json | tail -n +11 | xargs -r rm -f
            curl -fsS "http://localhost:3007/health/?deep=1" >/dev/null
            curl -fsS http://localhost/peptides/ >/dev/null
            curl -fsS http://localhost/peptides/peptideos/semaglutide/ >/dev/null
            echo "Deploy completed at $(date)"
