services:
  db:
    image: postgres:16-alpine
    container_name: peptides-db
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=peptides
      - POSTGRES_USER=peptides
      - POSTGRES_PASSWORD=${PEPTIDES_DB_PASSWORD:?PEPTIDES_DB_PASSWORD is required}
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U peptides -d peptides"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: .
    container_name: peptides-web
    ports:
      - "3007:8000"
    environment:
      - DEBUG=${PEPTIDES_DEBUG:-False}
      - SECRET_KEY=${SECRET_KEY:?SECRET_KEY is required}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-localhost,127.0.0.1,45.63.90.69,mlt.com.br,guiadepeptideos.com.br,www.guiadepeptideos.com.br}
      - GA4_MEASUREMENT_ID=${GA4_MEASUREMENT_ID:-}
      - FORCE_SCRIPT_NAME=/peptides
      - DB_ENGINE=${DB_ENGINE:-django.db.backends.postgresql}
      - DB_NAME=${DB_NAME:-peptides}
      - DB_USER=${DB_USER:-peptides}
      - DB_PASSWORD=${PEPTIDES_DB_PASSWORD:?PEPTIDES_DB_PASSWORD is required}
      - DB_HOST=${DB_HOST:-db}
      - DB_PORT=${DB_PORT:-5432}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/?deep=1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: peptides-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    volumes:
      - redis-data:/data

volumes:
  postgres-data:
  redis-data:
